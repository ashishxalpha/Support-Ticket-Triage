name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Backend Lint ───────────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff mypy
      - name: Ruff lint
        run: cd backend && ruff check app/
      - name: Ruff format check
        run: cd backend && ruff format --check app/

  # ── Backend Tests ──────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: test_db
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET_KEY: test-secret-key
      AI_PROVIDER: openai
      OPENAI_API_KEY: sk-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx faker factory-boy
      - name: Run tests
        run: cd backend && pytest -v --cov=app --cov-report=xml

  # ── Frontend Lint ──────────────────────────────────────────
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: cd frontend && npm install
      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  # ── Docker Build ───────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t support-triage-backend ./backend
      - name: Build frontend image
        run: docker build -t support-triage-frontend ./frontend
